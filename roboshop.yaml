- name: roboshop instance management
  hosts: local
  connection : local
  vars:
    instances: ["mongodb", "redis", "mysql", "rabbitmq", "catalogue", "user", "payment", "shipping", "backend", "frontend"]
    image_id: ami-0220d79f3f480ecf5
    domain_name: ammienugu.online
    #action: create
  tasks: 
  - name: Create instance
    amazon.aws.ec2_instance:
      name: "roboshop-{{ item }}"
      image_id: "{{ image_id }}"
      region: us-east-1
      instance_type: t3.micro
      security_group: 
      - "roboshop-{{ item }}"
      - roboshop-common
    loop: "{{ instances }}"
    register: ec2_output

  - name: Print output
    debug:
      msg: " {{ ec2_output }}"
      
 

